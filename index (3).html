<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#040a10">
<title>Pensioenplanner</title>
<style>
  :root{
    --bg:#040a10;
    --panel:#060d14;
    --panel-alt:#091828;
    --border:#16293c;
    --border-strong:#27425e;
    --border-soft:#13283d;
    --text:#ecf4fc;
    --text-dim:#dcebfa;
    --muted:#9ab6d2;
    --muted2:#84a2c0;
    --muted3:#6d8db0;
    --green:#2ecc71;
    --red:#e74c3c;
    --amber:#f0a500;
    --blue:#2a7fff;
    --orange:#e07040;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text-dim);
    font-family:'Inter',system-ui,sans-serif}
  #root{min-height:100vh}

  .app{display:flex;flex-direction:column;min-height:100vh}

  .header{background:var(--panel);border-bottom:1px solid var(--border);
    padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .header-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--text)}
  .header-sub{font-size:11px;color:var(--muted2);margin-top:2px;letter-spacing:1px}
  .header-meta{margin-left:auto;font-size:12px;color:var(--muted2);text-align:right}
  .header-meta b{color:var(--text-dim)}

  .layout{display:flex;flex:1;gap:16px;padding:16px;flex-wrap:wrap}
  .sidebar{flex:0 0 340px;display:flex;flex-direction:column;gap:12px;min-width:280px}
  .main{flex:1;min-width:320px;display:flex;flex-direction:column;gap:12px}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
  .card-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);margin:0 0 10px 0;font-weight:600}

  .field{margin-bottom:10px}
  .field-label{font-size:11px;color:var(--muted);margin-bottom:4px;
    text-transform:uppercase;letter-spacing:1px}
  .field-hint{color:var(--blue);text-transform:none;letter-spacing:normal;margin-left:4px}
  .field-input-wrap{display:flex;align-items:center;background:#000a12;
    border:1px solid var(--border-strong);border-radius:5px}
  .field-input{flex:1;background:transparent;border:none;color:var(--text);
    padding:8px 9px;font-size:14px;font-family:'DM Mono',monospace;outline:none;width:100%}
  .field-input-full{width:100%;background:#000a12;border:1px solid var(--border-strong);
    border-radius:5px;color:var(--text);padding:7px 8px;font-size:14px;
    font-family:inherit;outline:none;box-sizing:border-box}
  .field-affix{padding:0 8px;color:var(--muted2);font-size:13px}
  .small-text{font-size:11px;color:var(--muted3);line-height:1.5;margin-top:2px}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;
    gap:10px;margin-bottom:10px}
  .toggle{width:38px;height:22px;border-radius:11px;border:1px solid var(--border-strong);
    background:var(--border-soft);position:relative;cursor:pointer;flex:0 0 auto;padding:0}
  .toggle-on{background:#0d2a50;border-color:var(--blue)}
  .toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;
    background:var(--muted2);transition:left .15s,background .15s}
  .toggle-on .toggle-knob{left:18px;background:var(--blue)}

  .radio-group{display:flex;flex-direction:column;gap:6px}
  .radio-option{display:flex;align-items:flex-start;gap:8px;cursor:pointer;
    padding:8px;border:1px solid var(--border-soft);border-radius:5px;background:#000a12}
  .radio-option.active{border-color:var(--blue);background:#06182c}
  .radio-option input{margin-top:3px}
  .radio-option-text b{display:block;font-size:13px;color:var(--text-dim)}
  .radio-option-text span{font-size:11px;color:var(--muted3)}

  .button{background:var(--border-soft);border:1px solid var(--border-strong);
    color:var(--text-dim);border-radius:5px;padding:7px 12px;font-size:12px;
    cursor:pointer;font-family:inherit}
  .button:hover{border-color:var(--blue)}
  .button-row{display:flex;gap:8px;flex-wrap:wrap}
  .button-danger:hover{border-color:var(--red)}

  .post-row{display:grid;grid-template-columns:1fr 110px 130px 28px;gap:6px;
    align-items:end;margin-bottom:8px}
  .post-remove{background:none;border:none;color:var(--muted3);cursor:pointer;
    font-size:16px;line-height:1;padding:8px 0;align-self:center}
  .post-remove:hover{color:var(--red)}

  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
  .tab{background:none;border:none;color:var(--muted2);padding:10px 14px;
    font-size:13px;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
  .tab.active{color:var(--text);border-bottom-color:var(--blue)}

  .banner{padding:10px 14px;border-radius:6px;font-size:12.5px;line-height:1.6;
    border:1px solid var(--border-soft)}
  .banner-warning{background:#1a0f06;border-color:#5a3a10;color:#f0c080}
  .banner-danger{background:#1a0608;border-color:#5a1010;color:#f0a0a0}
  .banner-info{background:#06182c;border-color:#1a3a5a;color:var(--muted)}
  .banner-ok{background:#061a0e;border-color:#1a4a30;color:#a0e0b0}

  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .summary-card{padding:16px;background:var(--panel);border-radius:8px;border:1px solid var(--border)}
  .summary-card .fase{font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .summary-card .periode{font-size:12px;color:var(--muted2);margin-bottom:8px}
  .summary-card .detail{font-size:11px;color:var(--muted3);line-height:1.6;margin-bottom:10px}
  .summary-card .eind-label{font-size:11px;color:var(--muted2)}
  .summary-card .eind-bedrag{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}

  table{width:100%;border-collapse:collapse}
  th{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border-strong);
    color:var(--muted2);font-weight:400;font-size:11px;text-transform:uppercase;
    letter-spacing:.8px;white-space:nowrap;font-family:'DM Mono',monospace}
  th.th-left{text-align:left}
  td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border-soft);
    font-size:13px;white-space:nowrap;font-family:'DM Mono',monospace}
  td.td-left{text-align:left}
  tr.odd{background:var(--panel)}
  tr.totaalrij{border-top:1px solid #1a3a5a;background:var(--panel-alt)}

  .toelichting{font-size:11px;color:var(--muted3);line-height:1.6;
    background:#000a12;border:1px solid var(--border-soft);border-radius:6px;
    padding:10px 12px;margin-bottom:12px}
  .toelichting-label{color:var(--muted2);text-transform:uppercase;letter-spacing:1px;
    font-size:10px;display:block;margin-bottom:4px}

  details.subcard{border:1px solid var(--border-soft);border-radius:6px;padding:8px 10px;margin-bottom:10px}
  details.subcard summary{cursor:pointer;font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:1px;outline:none}
  details.subcard[open] summary{margin-bottom:8px}

  @media (max-width:760px){
    .layout{flex-direction:column}
    .sidebar{flex:1 1 auto}
  }
</style>
</head>
<body>
<div id="root"><div style="padding:24px;font-family:system-ui,sans-serif">Laden…</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ============================================================
   FORMATTERS
   ============================================================ */
const EUR = new Intl.NumberFormat("nl-NL", {
  style: "currency",
  currency: "EUR",
  maximumFractionDigits: 0,
});
const MONTH_NAMES = ["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];

/* ============================================================
   ALGEMENE HELPERS
   ============================================================ */

// Parse "YYYY-MM" naar een Date (dag 1). Geeft `fallback` terug bij ongeldige input.
function parseMonthString(str, fallback) {
  const m = /^(\d{4})-(\d{2})$/.exec(str || "");
  return m ? new Date(Number(m[1]), Number(m[2]) - 1, 1) : fallback;
}

// Aantal maanden tussen twee datums (van -> naar), minimaal 0.
function monthsBetweenClamped(from, to) {
  const n = (to.getFullYear() - from.getFullYear()) * 12 + (to.getMonth() - from.getMonth());
  return Math.max(0, n);
}

// Maandindex van `datum` ten opzichte van `peildatum` (kan negatief zijn).
function maandenSindsPeildatum(datum, peildatum) {
  return (datum.getFullYear() - peildatum.getFullYear()) * 12 + (datum.getMonth() - peildatum.getMonth());
}

function monthLabel(date) {
  return `${MONTH_NAMES[date.getMonth()]} ${date.getFullYear()}`;
}

// Leeftijd in jaren op `datum`, gegeven geboortejaar/-maand.
function ageInYearsAt(date, birthYear, birthMonth) {
  return date.getFullYear() - birthYear + (date.getMonth() + 1 < birthMonth ? -1 : 0);
}

// Robuuste numerieke conversie: NaN/leeg -> `min` (default 0), nooit lager dan `min`.
function safeNumber(value, min = 0) {
  const n = Number(value);
  return Number.isFinite(n) ? Math.max(min, n) : min;
}

function pad2(n) {
  return String(n).padStart(2, "0");
}

// Zet een jaarpercentage om in een maandfactor via geometrische samenstelling,
// zodat het ingevulde percentage exact het jaarlijks samengestelde rendement is
// (in plaats van de benadering jaarpercentage/12).
function jaarPercentageNaarMaandFactor(jaarPercentage) {
  return Math.pow(1 + jaarPercentage / 100, 1 / 12) - 1;
}

// Geeft de hypotheeklast (€/mnd) op maandindex `globalIndex` (maanden sinds
// peildatum): de ingevulde maandlast tot de aflossingsdatum, daarna € 0.
// Zonder aflossingsdatum geldt de maandlast onbeperkt door (bv. aflossingsvrij).
function berekenHypotheeklast(invoer, peildatum, aflossingDatum, globalIndex) {
  if (invoer.hypotheekMaandlast <= 0) return 0;
  if (!aflossingDatum) return invoer.hypotheekMaandlast;
  const maandIndexAflossing = maandenSindsPeildatum(aflossingDatum, peildatum);
  return globalIndex < maandIndexAflossing ? invoer.hypotheekMaandlast : 0;
}

/* ============================================================
   AOW-LEEFTIJD
   ------------------------------------------------------------
   Bron: SVB-tabel AOW-leeftijd per geboortedatum (peildatum: 2024).
   "vastgesteld: true"  = wettelijk vastgelegd.
   "vastgesteld: false" = nog niet wettelijk vastgesteld; de overheid
   legt de AOW-leeftijd uiterlijk 5 jaar van tevoren definitief vast
   op basis van de CBS-levensverwachting. De waarden hieronder voor
   geboortejaren vanaf ca. 1970 zijn dus een PROGNOSE.

   ONDERHOUD: werk deze tabel bij wanneer de overheid een nieuwe
   AOW-leeftijd vaststelt of de prognose wijzigt. Tot die tijd kun je
   in de instellingen ook een eigen AOW-leeftijd invullen, die deze
   tabel volledig overschrijft.
   ============================================================ */
const AOW_TABEL = [
  { voor: new Date(1948, 0, 1), jaren: 65, maanden: 0, vastgesteld: true },
  { voor: new Date(1952, 0, 1), jaren: 65, maanden: 6, vastgesteld: true },
  { voor: new Date(1955, 0, 1), jaren: 66, maanden: 4, vastgesteld: true },
  { voor: new Date(1957, 2, 1), jaren: 66, maanden: 10, vastgesteld: true },
  { voor: new Date(1961, 0, 1), jaren: 67, maanden: 0, vastgesteld: true },
  { voor: new Date(1964, 9, 1), jaren: 67, maanden: 3, vastgesteld: true },
  { voor: new Date(1970, 0, 1), jaren: 67, maanden: 6, vastgesteld: false },
  { voor: new Date(1976, 0, 1), jaren: 67, maanden: 9, vastgesteld: false },
  { voor: new Date(1983, 0, 1), jaren: 68, maanden: 0, vastgesteld: false },
  { voor: new Date(1990, 0, 1), jaren: 68, maanden: 3, vastgesteld: false },
  { voor: new Date(1996, 0, 1), jaren: 68, maanden: 6, vastgesteld: false },
];
// Voor geboortedata op/na 1996-01-01 (geen tabelregel meer beschikbaar):
const AOW_FALLBACK = { jaren: 68, maanden: 9, vastgesteld: false };

function berekenAowAutomatisch(geboortejaar, geboortemaand) {
  const geboortedatum = new Date(geboortejaar, geboortemaand - 1, 1);
  for (const regel of AOW_TABEL) {
    if (geboortedatum < regel.voor) {
      return { jaren: regel.jaren, maanden: regel.maanden, vastgesteld: regel.vastgesteld, bron: "tabel" };
    }
  }
  return { ...AOW_FALLBACK, bron: "tabel" };
}

// Geeft de AOW-leeftijd terug: handmatige invoer (indien aangezet) of de tabel.
function berekenAowLeeftijd(invoer) {
  if (invoer.aowHandmatig) {
    return {
      jaren: safeNumber(invoer.aowJarenHandmatig, 60),
      maanden: Math.min(11, Math.max(0, Math.round(safeNumber(invoer.aowMaandenHandmatig, 0)))),
      vastgesteld: true,
      bron: "handmatig",
    };
  }
  return berekenAowAutomatisch(invoer.geboortejaar, invoer.geboortemaand);
}

// Bepaalt de AOW-/pensioendatum: geboortedatum + AOW-leeftijd (jaren + maanden).
function berekenAowDatum(geboortejaar, geboortemaand, aow) {
  const totaalMaanden = (geboortemaand - 1) + aow.jaren * 12 + aow.maanden;
  const jaar = geboortejaar + Math.floor(totaalMaanden / 12);
  const maand = (totaalMaanden % 12) + 1;
  return { jaar, maand, datum: new Date(jaar, maand - 1, 1) };
}

/* ============================================================
   EENMALIGE BEDRAGEN ("posten")
   ------------------------------------------------------------
   AANNAME: een eenmalig bedrag wordt geboekt in de maand waarin de
   opgegeven datum valt en draait vanaf die maand rendement mee, in
   welke fase (opbouw / overbrugging / pensioen) die maand ook valt.

   AANNAME: ligt de datum vóór de peildatum (huidige maand), dan wordt
   het bedrag alsnog in de peildatum-maand bijgeboekt en komt er een
   melding in de meldingenlijst.
   ============================================================ */
function verzamelEenmaligeBedragen(posten, peildatum, meldingen) {
  const bedragenPerMaand = new Map();
  for (const post of posten) {
    const bedrag = safeNumber(post.bedrag);
    if (bedrag <= 0) continue;
    const datum = parseMonthString(post.datum, null);
    if (!datum) continue;

    let maandIndex = maandenSindsPeildatum(datum, peildatum);
    if (maandIndex < 0) {
      meldingen.push(
        `${post.naam || "Eenmalig bedrag"}: datum ligt vóór de peildatum — bedrag wordt op de startmaand bijgeboekt.`
      );
      maandIndex = 0;
    }
    bedragenPerMaand.set(maandIndex, (bedragenPerMaand.get(maandIndex) || 0) + bedrag);
  }
  return bedragenPerMaand;
}

/* ============================================================
   FASE 1 — OPBOUW (vanaf peildatum tot stopdatum)
   ------------------------------------------------------------
   AANNAME: rendement wordt maandelijks samengesteld (jaarpercentage / 12),
   zowel op de beleggingen als op het cashdeel.

   AANNAME (instelbaar): de maandelijkse storting is standaard een vast
   nominaal bedrag. Met de instelling "storting groeit mee met inflatie"
   groeit dit bedrag mee vanaf de peildatum, met hetzelfde inflatiepercentage
   als fase 2 en 3.
   ============================================================ */
function berekenFase1(invoer, peildatum, stopDatum, eenmaligeBedragen) {
  const maandRendementBelegging = jaarPercentageNaarMaandFactor(invoer.rendementBelegging);
  const maandRenteCash = jaarPercentageNaarMaandFactor(invoer.renteCash);
  const aantalMaanden = monthsBetweenClamped(peildatum, stopDatum);

  let belegging = invoer.startBelegging;
  let cash = invoer.startCash;

  const serie = [{ maand: 0, totaal: belegging + cash, fase: 1 }];
  const jaarRijen = [];
  let inlegJaar = 0, rendementJaar = 0, eenmaligJaar = 0;

  for (let maand = 0; maand < aantalMaanden; maand++) {
    const huidigeDatum = new Date(peildatum.getFullYear(), peildatum.getMonth() + maand, 1);

    const storting = (invoer.inflatieAan && invoer.stortingMeeInflatie)
      ? invoer.maandStorting * Math.pow(1 + invoer.inflatie / 100, maand / 12)
      : invoer.maandStorting;

    const eenmalig = eenmaligeBedragen.get(maand) || 0;
    const rendementDezeMaand = belegging * maandRendementBelegging + cash * maandRenteCash;

    belegging = belegging * (1 + maandRendementBelegging) + storting + eenmalig;
    cash = cash * (1 + maandRenteCash);

    inlegJaar += storting;
    rendementJaar += rendementDezeMaand;
    eenmaligJaar += eenmalig;

    serie.push({ maand: maand + 1, totaal: belegging + cash, fase: 1 });

    const laatsteMaand = maand === aantalMaanden - 1;
    if (huidigeDatum.getMonth() === 11 || laatsteMaand) {
      jaarRijen.push({
        label: huidigeDatum.getMonth() === 11
          ? `${huidigeDatum.getFullYear()}`
          : `${huidigeDatum.getFullYear()} (t/m ${MONTH_NAMES[huidigeDatum.getMonth()]})`,
        inleg: Math.round(inlegJaar),
        rendement: Math.round(rendementJaar),
        extra: Math.round(eenmaligJaar),
        belegging: Math.round(belegging),
        cash: Math.round(cash),
        totaal: Math.round(belegging + cash),
      });
      inlegJaar = 0; rendementJaar = 0; eenmaligJaar = 0;
    }
  }

  return {
    aantalMaanden,
    beleggingEind: Math.round(belegging),
    cashEind: Math.round(cash),
    totaalEind: belegging + cash,
    jaarRijen,
    serie,
  };
}

/* ============================================================
   FASE 2 — OVERBRUGGING (stopdatum tot pensioendatum/AOW)
   ------------------------------------------------------------
   Cash en beleggingen worden APART bijgehouden, elk met hun eigen
   rendement (beleggingen tegen rendementBelegging, cash tegen renteCash) —
   dezelfde rendementen als in de opbouwfase.

   Volgorde per maand: 1) rendement bijschrijven in beide potten,
   2) netto behoefte (uitgaven - inkomen - eenmalig) onttrekken: EERST
   volledig uit cash, en pas als de cash op is uit de beleggingen
   (de cashbuffer beschermt zo tegen verkopen bij een lage beurs).
   Een netto overschot (inkomen hoger dan uitgaven, of een eenmalig
   bedrag) gaat naar de cashbuffer.

   AANNAME: uitgaven zijn nominale bedragen die, indien kosteninflatie aan
   staat, vanaf de peildatum (niet vanaf de stopdatum) cumulatief met de
   kosteninflatie meegroeien. Extra inkomen groeit los daarvan mee met het
   ingestelde indexatiepercentage voor inkomsten (default 0%, dus standaard
   geen automatische indexatie).

   AANNAME (instelbaar, hypotheek): zolang de maand vóór de aflossingsdatum
   van de hypotheek ligt, wordt de ingevulde hypotheeklast (nominaal, niet
   geïndexeerd) van de uitgaven afgetrokken. Zonder aflossingsdatum geldt de
   hypotheeklast onbeperkt door (bv. aflossingsvrije hypotheek).

   AANNAME (instelbaar, "tekortGedrag"):
   - "doorrekenen": het vermogen mag negatief worden. Zo zie je hoe
     diep en hoe snel het tekort oploopt (theoretische doorrekening).
   - "nul": het vermogen wordt nooit lager dan € 0. Het gemiste
     bedrag per maand wordt apart opgeteld in tekortBedragCumulatief,
     zodat je ziet hoeveel extra inkomen/vermogen er nodig zou zijn.
   ============================================================ */
function berekenFase2(invoer, peildatum, stopDatum, pensioenDatum, startBelegging, startCash, eenmaligeBedragen) {
  const maandRendementBelegging = jaarPercentageNaarMaandFactor(invoer.rendementBelegging);
  const maandRenteCash = jaarPercentageNaarMaandFactor(invoer.renteCash);
  const aantalMaanden = monthsBetweenClamped(stopDatum, pensioenDatum);
  const indexOffset = monthsBetweenClamped(peildatum, stopDatum);
  const aflossingDatum = parseMonthString(invoer.hypotheekAflossingDatum, null);

  let belegging = startBelegging;
  let cash = startCash;
  let tekort = false;
  let tekortDatum = null;
  let tekortBedragCumulatief = 0;

  const serie = [];
  const jaarRijen = [];
  let beginSaldoJaar = belegging + cash;
  let rendementJaar = 0, onttrokkenJaar = 0, inkomenJaar = 0, eenmaligJaar = 0;

  for (let maand = 0; maand < aantalMaanden; maand++) {
    const globalIndex = indexOffset + maand;
    const huidigeDatum = new Date(stopDatum.getFullYear(), stopDatum.getMonth() + maand + 1, 1);

    const kostenInflatieFactor = invoer.inflatieAan
      ? Math.pow(1 + invoer.inflatie / 100, (globalIndex + 1) / 12)
      : 1;
    const inkomenIndexatieFactor = Math.pow(1 + invoer.indexatieInkomen / 100, (globalIndex + 1) / 12);
    const hypotheeklast = berekenHypotheeklast(invoer, peildatum, aflossingDatum, globalIndex);
    const uitgaven = invoer.uitgavenOverbrugging * kostenInflatieFactor - hypotheeklast;
    const extraInkomen = invoer.extraInkomenPerMaand * inkomenIndexatieFactor;
    const eenmalig = eenmaligeBedragen.get(globalIndex) || 0;

    // 1) rendement bijschrijven, elk in de eigen pot.
    const rendement = belegging * maandRendementBelegging + cash * maandRenteCash;
    belegging += belegging * maandRendementBelegging;
    cash += cash * maandRenteCash;

    // 2) netto behoefte = uitgaven - inkomen - eenmalig. Positief = onttrekken,
    //    negatief = overschot (gaat naar de cashbuffer).
    const nettoBehoefte = uitgaven - extraInkomen - eenmalig;
    if (nettoBehoefte >= 0) {
      // Eerst cash opmaken, dan pas beleggingen verkopen.
      const uitCash = Math.min(cash, nettoBehoefte);
      cash -= uitCash;
      let rest = nettoBehoefte - uitCash;
      const uitBelegging = Math.min(Math.max(belegging, 0), rest);
      belegging -= uitBelegging;
      rest -= uitBelegging;
      if (rest > 1e-6) {
        if (!tekort) { tekort = true; tekortDatum = huidigeDatum; }
        if (invoer.tekortGedrag === "nul") {
          tekortBedragCumulatief += rest;
        } else {
          belegging -= rest; // doorrekenen: beleggingen mogen negatief worden
        }
      }
    } else {
      cash += -nettoBehoefte; // overschot naar de cashbuffer
    }

    rendementJaar += rendement;
    onttrokkenJaar += uitgaven;
    inkomenJaar += extraInkomen;
    eenmaligJaar += eenmalig;

    serie.push({ maand: globalIndex, totaal: belegging + cash, fase: 2 });

    const laatsteMaand = maand === aantalMaanden - 1;
    if ((maand + 1) % 12 === 0 || laatsteMaand) {
      jaarRijen.push({
        jaar: huidigeDatum.getFullYear(),
        leeftijd: ageInYearsAt(huidigeDatum, invoer.geboortejaar, invoer.geboortemaand),
        beginSaldo: Math.round(beginSaldoJaar),
        rendement: Math.round(rendementJaar),
        onttrokken: Math.round(onttrokkenJaar),
        inkomen: Math.round(inkomenJaar),
        extra: Math.round(eenmaligJaar),
        cash: Math.round(cash),
        belegging: Math.round(belegging),
        eindSaldo: Math.round(belegging + cash),
      });
      beginSaldoJaar = belegging + cash;
      rendementJaar = 0; onttrokkenJaar = 0; inkomenJaar = 0; eenmaligJaar = 0;
    }
  }

  return {
    aantalMaanden,
    beleggingEind: belegging,
    cashEind: cash,
    eindVermogen: belegging + cash,
    tekort,
    tekortDatum,
    tekortBedragCumulatief,
    jaarRijen,
    serie,
  };
}

/* ============================================================
   FASE 3 — PENSIOEN (pensioendatum/AOW tot de ingestelde planningshorizon)
   ------------------------------------------------------------
   Zelfde aanpak als fase 2: cash en beleggingen apart, elk eigen rendement,
   en onttrekking eerst uit cash en pas daarna uit beleggingen. Zelfde
   inflatie/indexatie- en hypotheek-aannames.
   "tekortPerMaandNominaal" is een puur informatief getal: het structurele
   nominale tekort (uitgaven - inkomen) op pensioendatum, zonder
   inflatiecorrectie — dus wat het tekort vandaag zou zijn als je nu al
   met pensioen ging.

   AANNAME: "planningshorizon" (leeftijdOverlijden) is geen sterftescenario,
   maar simpelweg de leeftijd tot waar wordt doorgerekend. Voor een beeld van
   het langlevenrisico kies je hier bewust een hoge leeftijd (bv. 95-100): het
   model laat dan zien wat het vermogen op die leeftijd nog is, of vanaf welk
   moment een tekort ontstaat.
   ============================================================ */
function berekenFase3(invoer, peildatum, pensioenDatum, startBelegging, startCash, eenmaligeBedragen) {
  const maandRendementBelegging = jaarPercentageNaarMaandFactor(invoer.rendementBelegging);
  const maandRenteCash = jaarPercentageNaarMaandFactor(invoer.renteCash);
  const overlijdenDatum = new Date(invoer.geboortejaar + invoer.leeftijdOverlijden, invoer.geboortemaand - 1, 1);
  const aantalMaanden = monthsBetweenClamped(pensioenDatum, overlijdenDatum);
  const indexOffset = monthsBetweenClamped(peildatum, pensioenDatum);
  const aflossingDatum = parseMonthString(invoer.hypotheekAflossingDatum, null);

  let belegging = startBelegging;
  let cash = startCash;
  let tekort = false;
  let tekortDatum = null;
  let tekortBedragCumulatief = 0;
  const tekortPerMaandNominaal = Math.max(0, invoer.uitgavenPensioen - invoer.pensioenInkomen);

  const serie = [];
  const jaarRijen = [];
  let beginSaldoJaar = belegging + cash;
  let rendementJaar = 0, uitgavenJaar = 0, inkomenJaar = 0, eenmaligJaar = 0;

  for (let maand = 0; maand < aantalMaanden; maand++) {
    const globalIndex = indexOffset + maand;
    const huidigeDatum = new Date(pensioenDatum.getFullYear(), pensioenDatum.getMonth() + maand + 1, 1);

    const kostenInflatieFactor = invoer.inflatieAan
      ? Math.pow(1 + invoer.inflatie / 100, (globalIndex + 1) / 12)
      : 1;
    const inkomenIndexatieFactor = Math.pow(1 + invoer.indexatieInkomen / 100, (globalIndex + 1) / 12);
    const hypotheeklast = berekenHypotheeklast(invoer, peildatum, aflossingDatum, globalIndex);
    const uitgaven = invoer.uitgavenPensioen * kostenInflatieFactor - hypotheeklast;
    const inkomen = invoer.pensioenInkomen * inkomenIndexatieFactor;
    const eenmalig = eenmaligeBedragen.get(globalIndex) || 0;

    // 1) rendement bijschrijven, elk in de eigen pot.
    const rendement = belegging * maandRendementBelegging + cash * maandRenteCash;
    belegging += belegging * maandRendementBelegging;
    cash += cash * maandRenteCash;

    // 2) netto behoefte = uitgaven - inkomen - eenmalig. Eerst cash, dan beleggingen.
    const nettoBehoefte = uitgaven - inkomen - eenmalig;
    if (nettoBehoefte >= 0) {
      const uitCash = Math.min(cash, nettoBehoefte);
      cash -= uitCash;
      let rest = nettoBehoefte - uitCash;
      const uitBelegging = Math.min(Math.max(belegging, 0), rest);
      belegging -= uitBelegging;
      rest -= uitBelegging;
      if (rest > 1e-6) {
        if (!tekort) { tekort = true; tekortDatum = huidigeDatum; }
        if (invoer.tekortGedrag === "nul") {
          tekortBedragCumulatief += rest;
        } else {
          belegging -= rest;
        }
      }
    } else {
      cash += -nettoBehoefte; // overschot naar de cashbuffer
    }

    rendementJaar += rendement;
    uitgavenJaar += uitgaven;
    inkomenJaar += inkomen;
    eenmaligJaar += eenmalig;

    serie.push({ maand: globalIndex, totaal: belegging + cash, fase: 3 });

    const laatsteMaand = maand === aantalMaanden - 1;
    if ((maand + 1) % 12 === 0 || laatsteMaand) {
      jaarRijen.push({
        leeftijd: ageInYearsAt(huidigeDatum, invoer.geboortejaar, invoer.geboortemaand),
        beginSaldo: Math.round(beginSaldoJaar),
        rendement: Math.round(rendementJaar),
        inkomen: Math.round(inkomenJaar),
        uitgaven: Math.round(uitgavenJaar),
        extra: Math.round(eenmaligJaar),
        cash: Math.round(cash),
        belegging: Math.round(belegging),
        eindSaldo: Math.round(belegging + cash),
      });
      beginSaldoJaar = belegging + cash;
      rendementJaar = 0; uitgavenJaar = 0; inkomenJaar = 0; eenmaligJaar = 0;
    }
  }

  return {
    aantalMaanden,
    beleggingEind: Math.round(belegging),
    cashEind: Math.round(cash),
    eindVermogen: Math.round(belegging + cash),
    tekort,
    tekortDatum,
    tekortBedragCumulatief,
    tekortPerMaandNominaal,
    jaarRijen,
    serie,
  };
}

/* ============================================================
   INVOER NORMALISEREN
   ============================================================ */
function normaliseerInvoer(ruw) {
  return {
    ...ruw,
    startBelegging: safeNumber(ruw.startBelegging),
    startCash: safeNumber(ruw.startCash),
    maandStorting: safeNumber(ruw.maandStorting),
    rendementBelegging: safeNumber(ruw.rendementBelegging, -100),
    renteCash: safeNumber(ruw.renteCash, -100),
    geboortejaar: safeNumber(ruw.geboortejaar, 1900),
    geboortemaand: Math.min(12, Math.max(1, Math.round(safeNumber(ruw.geboortemaand, 1)))),
    posten: (ruw.posten || []).map((p) => ({ ...p, bedrag: safeNumber(p.bedrag) })),
    extraInkomenPerMaand: safeNumber(ruw.extraInkomenPerMaand),
    uitgavenOverbrugging: safeNumber(ruw.uitgavenOverbrugging),
    uitgavenPensioen: safeNumber(ruw.uitgavenPensioen),
    pensioenInkomen: safeNumber(ruw.pensioenInkomen),
    leeftijdOverlijden: safeNumber(ruw.leeftijdOverlijden, 60),
    inflatie: safeNumber(ruw.inflatie, 0),
    inflatieAan: !!ruw.inflatieAan,
    indexatieInkomen: safeNumber(ruw.indexatieInkomen, 0),
    huisWaarde: safeNumber(ruw.huisWaarde),
    huisHypotheek: safeNumber(ruw.huisHypotheek),
    huisOverwaardeMeenemen: !!ruw.huisOverwaardeMeenemen,
    hypotheekMaandlast: safeNumber(ruw.hypotheekMaandlast),    hypotheekAflossingDatum: ruw.hypotheekAflossingDatum || "",
    stortingMeeInflatie: !!ruw.stortingMeeInflatie,
    aowHandmatig: !!ruw.aowHandmatig,
    aowJarenHandmatig: safeNumber(ruw.aowJarenHandmatig, 60),
    aowMaandenHandmatig: Math.min(11, Math.max(0, Math.round(safeNumber(ruw.aowMaandenHandmatig, 0)))),
    tekortGedrag: ruw.tekortGedrag === "nul" ? "nul" : "doorrekenen",
  };
}

/* ============================================================
   TOTALE BEREKENING
   ============================================================ */
function berekenPlan(ruweInvoer) {
  const nu = new Date();
  const peildatum = new Date(nu.getFullYear(), nu.getMonth(), 1);

  const invoer = normaliseerInvoer(ruweInvoer);
  const meldingen = [];

  const aow = berekenAowLeeftijd(invoer);
  const aowDatum = berekenAowDatum(invoer.geboortejaar, invoer.geboortemaand, aow);
  const pensioenDatum = aowDatum.datum;

  // Stopdatum = einde fase 1 / start fase 2. Leeg of vóór peildatum -> fase 1 telt 0 maanden.
  const stopDatum = parseMonthString(invoer.stopDatum, peildatum) < peildatum
    ? peildatum
    : parseMonthString(invoer.stopDatum, peildatum);

  if (pensioenDatum <= stopDatum) {
    meldingen.push("Pensioendatum (AOW-leeftijd) ligt niet na de stopdatum — overbrugging (fase 2) is 0 maanden.");
  }
  if (parseMonthString(invoer.stopDatum, peildatum) <= peildatum) {
    meldingen.push("Stopdatum ligt niet na de peildatum (huidige maand) — opbouwfase (fase 1) is 0 maanden.");
  }
  if (!aow.vastgesteld) {
    meldingen.push(
      "AOW-leeftijd is voor deze geboortedatum nog niet wettelijk vastgesteld — getoonde leeftijd is een prognose. " +
      "Je kunt dit overschrijven via 'AOW-leeftijd handmatig instellen'."
    );
  }

  const eenmaligeBedragen = verzamelEenmaligeBedragen(invoer.posten, peildatum, meldingen);

  const fase1 = berekenFase1(invoer, peildatum, stopDatum, eenmaligeBedragen);

  // Het vermogen aan het einde van fase 1 stroomt ongewijzigd door naar fase 2,
  // gesplitst in beleggingen en cash (elk met hun eigen rendement). De woning
  // telt niet als vermogen mee: de overwaarde zit vast in het huis en is geen
  // besteedbaar geld. Alleen de maandelijkse hypotheeklast (zie fase 2/3) werkt
  // door, en verlaagt daar de uitgaven tot de hypotheek is afgelost.
  const fase2 = berekenFase2(invoer, peildatum, stopDatum, pensioenDatum, fase1.beleggingEind, fase1.cashEind, eenmaligeBedragen);
  const fase3 = berekenFase3(invoer, peildatum, pensioenDatum, fase2.beleggingEind, fase2.cashEind, eenmaligeBedragen);

  if (fase2.tekort && invoer.tekortGedrag === "doorrekenen") {
    meldingen.push(
      "Vermogen wordt negatief tijdens de overbrugging — de doorrekening laat zien hoe diep dit gat wordt " +
      "(theoretisch scenario). Zet 'bij tekort' op 'niet onder € 0' om dit te begrenzen."
    );
  }
  if (fase3.tekort && invoer.tekortGedrag === "doorrekenen") {
    meldingen.push(
      "Vermogen wordt negatief tijdens de pensioenfase — de doorrekening laat zien hoe diep dit gat wordt " +
      "(theoretisch scenario). Zet 'bij tekort' op 'niet onder € 0' om dit te begrenzen."
    );
  }

  const tekortDatum = fase2.tekortDatum || fase3.tekortDatum;

  return {
    invoer, peildatum, stopDatum, pensioenDatum, aow,
    fase1, fase2, fase3, tekortDatum, meldingen,
    heeftTekort: fase2.tekort || fase3.tekort,
  };
}

    console.warn("Kon opgeslagen gegevens niet laden:", e);
    return defaultForm();
  }
}

          <Card title="Overbrugging (fase 2)">
            <Veld label="Uitgaven per maand" value={T.uitgavenOverbrugging} onChange={setNum("uitgavenOverbrugging")} prefix="€" />
            <Veld label="Extra inkomen per maand" value={T.extraInkomenPerMaand} onChange={setNum("extraInkomenPerMaand")} prefix="€" />
            <div className="small-text">
              Cash en beleggingen blijven ook in deze fase apart, elk met hun eigen rendement
              (beleggingen {T.rendementBelegging}%/jr, cash {T.renteCash}%/jr). Onttrekking gaat
              eerst volledig uit cash en pas daarna uit beleggingen.
            </div>
          </Card>

          <Card title="Pensioen (fase 3)">
            <Veld label="Uitgaven per maand" value={T.uitgavenPensioen} onChange={setNum("uitgavenPensioen")} prefix="€" />
            <Veld label="Pensioen + AOW per maand" value={T.pensioenInkomen} onChange={setNum("pensioenInkomen")} prefix="€" />
            <Veld
              label="Doorrekenen tot leeftijd (planningshorizon)"
              value={T.leeftijdOverlijden}
              onChange={setNum("leeftijdOverlijden")}
              suffix="jaar"
              hint="geen sterftescenario, alleen het eindpunt van de berekening"
            />
          </Card>

          <Card title="Eenmalige bedragen">
            <div className="post-row" style={{ marginBottom: 4 }}>
              <div className="field-label">Naam</div>
              <div className="field-label">Bedrag</div>
              <div className="field-label">Maand</div>
              <div />
            </div>
            {T.posten.map((p) => (
              <div className="post-row" key={p.id}>
                <input className="field-input-full" type="text" value={p.naam}
                  placeholder="bijv. erfenis"
                  onChange={(e) => setPostVeld(p.id, "naam")(e.target.value)} />
                <div className="field-input-wrap">
                  <span className="field-affix">€</span>
                  <input className="field-input" type="number" value={p.bedrag}
                    onChange={(e) => setPostVeld(p.id, "bedrag")(e.target.value)} />
                </div>
                <input className="field-input-full" type="month" value={p.datum}
                  onChange={(e) => setPostVeld(p.id, "datum")(e.target.value)} />
                <button className="post-remove" onClick={verwijderPost(p.id)} title="Verwijderen">×</button>
              </div>
            ))}
            <button className="button" onClick={voegPostToe}>+ Bedrag toevoegen</button>
            <div className="small-text" style={{ marginTop: 8 }}>
              Een bedrag wordt geboekt in de opgegeven maand en draait vanaf dat moment rendement mee,
              ongeacht in welke fase die maand valt. Een datum vóór de peildatum wordt op de startmaand geboekt.
            </div>
          </Card>

          <Card title="Hypotheek">
            <Veld
              label="Hypotheeklast per maand"
              value={T.hypotheekMaandlast}
              onChange={setNum("hypotheekMaandlast")}
              prefix="€"
              hint="zit al in 'uitgaven per maand', wordt daar tot de aflossing weer afgetrokken"
            />
            <MaandVeld
              label="Hypotheek afgelost per"
              value={T.hypotheekAflossingDatum}
              onChange={set("hypotheekAflossingDatum")}
              hint="leeg = nooit (aflossingsvrij)"
            />
            <div className="small-text">
              Tot deze datum wordt de hypotheeklast (nominaal, zonder indexatie) van je uitgaven afgetrokken;
              daarna valt de last weg en gelden de volledige uitgaven weer. De overwaarde van het huis telt
              bewust niet als vermogen mee, want die zit vast in de woning en is geen besteedbaar geld.
            </div>
          </Card>

          <Card title="Aannames &amp; instellingen">
            <Toggle
              label="Kosteninflatie meenemen"
              value={T.inflatieAan}
              onChange={set("inflatieAan")}
              hint="Uitgaven (en optioneel de storting) groeien jaarlijks mee, cumulatief vanaf de peildatum."
            />
            {T.inflatieAan && (
              <Veld label="Kosteninflatie" value={T.inflatie} onChange={setNum("inflatie")} suffix="% / jr" step={0.1} />
            )}
            {T.inflatieAan && (
              <Toggle
                label="Maandelijkse storting groeit mee met inflatie"
                value={T.stortingMeeInflatie}
                onChange={set("stortingMeeInflatie")}
                hint="Staat uit: storting blijft een vast nominaal bedrag tijdens de opbouwfase."
              />
            )}
            <Veld
              label="Indexatie pensioen + AOW + extra inkomen"
              value={T.indexatieInkomen}
              onChange={setNum("indexatieInkomen")}
              suffix="% / jr"
              step={0.1}
              hint="0% = geen automatische verhoging (niet zeker dat inkomen meegroeit met inflatie)"
            />

            <details className="subcard">
              <summary>AOW-leeftijd</summary>
              <div className="small-text" style={{ marginBottom: 8 }}>
                Standaard wordt de AOW-leeftijd automatisch bepaald aan de hand van een tabel op basis van het
                geboortejaar. Voor geboortejaren vanaf ca. 1970 is dit nog een prognose. Zet hier een eigen
                AOW-leeftijd neer als je een andere aanname wilt gebruiken.
              </div>
              <Toggle
                label="AOW-leeftijd handmatig instellen"
                value={T.aowHandmatig}
                onChange={set("aowHandmatig")}
              />
              {T.aowHandmatig && (
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ flex: 1 }}>
                    <Veld label="Jaren" value={T.aowJarenHandmatig} onChange={setNum("aowJarenHandmatig")} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <Veld label="Maanden" value={T.aowMaandenHandmatig} onChange={setNum("aowMaandenHandmatig")} min={0} max={11} />
                  </div>
                </div>
              )}
            </details>

            <details className="subcard">
              <summary>Bij een tekort</summary>
              <div className="small-text" style={{ marginBottom: 8 }}>
                Wat moet er gebeuren als het vermogen in fase 2 of 3 op zou raken?
              </div>
              <div className="radio-group">
                <label className={"radio-option" + (T.tekortGedrag === "doorrekenen" ? " active" : "")}>
                  <input type="radio" name="tekortGedrag" checked={T.tekortGedrag === "doorrekenen"}
                    onChange={() => set("tekortGedrag")("doorrekenen")} />
                  <div className="radio-option-text">
                    <b>Doorrekenen</b>
                    <span>Het vermogen mag negatief worden. Laat zien hoe diep en hoe snel het tekort oploopt.</span>
                  </div>
                </label>
                <label className={"radio-option" + (T.tekortGedrag === "nul" ? " active" : "")}>
                  <input type="radio" name="tekortGedrag" checked={T.tekortGedrag === "nul"}
                    onChange={() => set("tekortGedrag")("nul")} />
                  <div className="radio-option-text">
                    <b>Niet onder € 0 laten zakken</b>
                    <span>Het vermogen stopt bij € 0; het gemiste bedrag wordt apart opgeteld als tekortbedrag.</span>
                  </div>
                </label>
              </div>
            </details>
          </Card>

          <Card title="Gegevens">
            <div className="small-text" style={{ marginBottom: 8 }}>
              Je invoer wordt automatisch lokaal in deze browser opgeslagen (localStorage) en blijft bewaard
              na een herlaad. Gebruik export/import om gegevens over te zetten naar een andere browser of computer.
            </div>
            <div className="button-row">
              <button className="button" onClick={exporteer}>Exporteren (.json)</button>
              <label className="button" style={{ cursor: "pointer" }}>
                Importeren (.json)
                <input type="file" accept="application/json" onChange={importeer} style={{ display: "none" }} />
              </label>
              <button className="button button-danger" onClick={resetAlles}>Alles wissen</button>
            </div>
          </Card>
        </aside>

        {/* ===================== HOOFDGEDEELTE ===================== */}
        <main className="main">
          {meldingen.length > 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {meldingen.map((m, i) => (
                <Banner key={i} type={m.toLowerCase().includes("tekort") ? "danger" : (m.includes("prognose") ? "warning" : "info")}>
                  {m}
                </Banner>
              ))}
            </div>
          )}

          {tekortDatum && (
            <Banner type="danger">
              <b>Let op:</b> vanaf <b>{monthLabel(tekortDatum)}</b> is het vermogen ontoereikend op basis van de huidige aannames.
              {T.tekortGedrag === "doorrekenen"
                ? " De cijfers hierna laten een negatief vermogen zien (theoretische doorrekening)."
                : " Het vermogen wordt vanaf dat moment op € 0 gehouden; zie 'tekortbedrag' in de tabellen voor het gemiste bedrag."}
            </Banner>
          )}

          <div className="tabs">
            <button className={"tab" + (tab === "overzicht" ? " active" : "")} onClick={() => setTab("overzicht")}>Overzicht</button>
            <button className={"tab" + (tab === "fase1" ? " active" : "")} onClick={() => setTab("fase1")}>Opbouw</button>
            <button className={"tab" + (tab === "fase2" ? " active" : "")} onClick={() => setTab("fase2")}>Overbrugging</button>
            <button className={"tab" + (tab === "fase3" ? " active" : "")} onClick={() => setTab("fase3")}>Pensioen</button>
          </div>

          {tab === "overzicht" && (
            <div className="summary-grid">
              <div className="summary-card">
                <div className="fase" style={{ color: KLEUR_BLAUW }}>FASE 1 · OPBOUW</div>
                <div className="periode">{monthLabel(peildatum)} t/m {monthLabel(stopDatum)} ({fase1.aantalMaanden} mnd)</div>
                <div className="detail">
                  Start: {EUR.format(T.startBelegging + T.startCash)}.
                  Storting {EUR.format(T.maandStorting)}/mnd{T.stortingMeeInflatie && T.inflatieAan ? " (groeit mee met inflatie)" : ""}.
                  Rendement {T.rendementBelegging}% (beleggingen) / {T.renteCash}% (cash).
                </div>
                <div className="eind-label">Eindstand</div>
                <div className="eind-bedrag" style={{ color: KLEUR_BLAUW }}>{EUR.format(fase1.totaalEind)}</div>
              </div>

              <div className="summary-card">
                <div className="fase" style={{ color: "#6a9a2a" }}>FASE 2 · OVERBRUGGING</div>
                <div className="periode">{monthLabel(stopDatum)} t/m {monthLabel(pensioenDatum)} ({fase2.aantalMaanden} mnd)</div>
                <div className="detail">
                  Netto onttrekking {EUR.format(T.uitgavenOverbrugging - T.extraInkomenPerMaand)}/mnd nominaal
                  {T.hypotheekMaandlast > 0 ? ` (incl. hypotheeklast ${EUR.format(T.hypotheekMaandlast)}, valt weg ${T.hypotheekAflossingDatum ? `na ${monthLabel(parseMonthString(T.hypotheekAflossingDatum, peildatum))}` : "nooit"})` : ""}.
                  Rendement beleggingen {T.rendementBelegging}%/jr, cash {T.renteCash}%/jr (apart). Eerst cash op, dan beleggingen.
                  {fase2.tekortBedragCumulatief > 0 && ` Tekortbedrag (cumulatief, niet onttrokken): ${EUR.format(fase2.tekortBedragCumulatief)}.`}
                </div>
                <div className="eind-label">Eindstand</div>
                <div className="eind-bedrag" style={{ color: fase2.tekort ? KLEUR_ROOD : KLEUR_GROEN }}>{EUR.format(Math.round(fase2.eindVermogen))}</div>
              </div>

              <div className="summary-card">
                <div className="fase" style={{ color: KLEUR_ORANJE }}>FASE 3 · PENSIOEN</div>
                <div className="periode">{monthLabel(pensioenDatum)} t/m leeftijd {T.leeftijdOverlijden} ({fase3.aantalMaanden} mnd)</div>
                <div className="detail">
                  Pensioen + AOW {EUR.format(T.pensioenInkomen)}/mnd, uitgaven {EUR.format(T.uitgavenPensioen)}/mnd nominaal.
                  Nominaal tekort op pensioendatum: {EUR.format(fase3.tekortPerMaandNominaal)}/mnd.
                  {T.inflatieAan ? ` Uitgaven groeien met ${T.inflatie}%/jr (kosteninflatie),` : " Uitgaven blijven nominaal vast,"}
                  {` inkomen met ${T.indexatieInkomen}%/jr (indexatie).`}
                  {fase3.tekortBedragCumulatief > 0 && ` Tekortbedrag (cumulatief, niet onttrokken): ${EUR.format(fase3.tekortBedragCumulatief)}.`}
                </div>
                <div className="eind-label">Eindstand</div>
                <div className="eind-bedrag" style={{ color: fase3.tekort ? KLEUR_ROOD : KLEUR_GREEN_FALLBACK(fase3) }}>{EUR.format(fase3.eindVermogen)}</div>
              </div>
            </div>
          )}

          {tab === "fase1" && (
            <div>
              <Toelichting>
                Elke maand: saldo &times; (1 + {fmtPercentPerMaand(T.rendementBelegging)}) + storting {EUR.format(T.maandStorting)}
                {T.stortingMeeInflatie && T.inflatieAan ? " (groeit mee met inflatie vanaf de peildatum)" : ""}.
                Cash groeit tegen {T.renteCash}%/jr.
                Eenmalige bedragen ({T.posten.filter((p) => p.bedrag > 0).map((p) => `${p.naam || "post"} ${EUR.format(p.bedrag)}${parseMonthString(p.datum, null) ? ` in ${monthLabel(parseMonthString(p.datum, null))}` : ""}`).join(", ") || "geen"})
                worden in hun eigen maand bijgeboekt en draaien vanaf dat moment rendement mee, in welke fase de datum ook valt.
              </Toelichting>
              <table>
                <thead>
                  <tr>
                    <Th left>Jaar</Th><Th>Inleg</Th><Th>Rendement</Th><Th>Eenmalig</Th>
                    <Th>Beleggingen</Th><Th>Cash</Th><Th>Totaal</Th>
                  </tr>
                </thead>
                <tbody>
                  <tr className="totaalrij">
                    <Td left value={`Start (${monthLabel(peildatum)})`} />
                    <Td value="—" color="#84a2c0" />
                    <Td value="—" color="#84a2c0" />
                    <Td value="—" color="#84a2c0" />
                    <Td value={EUR.format(T.startBelegging)} />
                    <Td value={EUR.format(T.startCash)} />
                    <Td value={EUR.format(T.startBelegging + T.startCash)} color={KLEUR_BLAUW} bold />
                  </tr>
                  {fase1.jaarRijen.map((r, i) => (
                    <tr key={i} className={i % 2 ? "odd" : ""}>
                      <Td left value={r.label} />
                      <Td value={EUR.format(r.inleg)} color="#9ab6d2" />
                      <Td value={EUR.format(r.rendement)} color={KLEUR_GROEN} />
                      <Td value={r.extra > 0 ? EUR.format(r.extra) : "—"} color={r.extra > 0 ? KLEUR_AMBER : "#84a2c0"} />
                      <Td value={EUR.format(r.belegging)} />
                      <Td value={EUR.format(r.cash)} />
                      <Td value={EUR.format(r.totaal)} color={KLEUR_BLAUW} bold />
                    </tr>
                  ))}
                  <tr className="totaalrij">
                    <Td left value={`Start fase 2 (${monthLabel(stopDatum)})`} />
                    <Td value="" /><Td value="" /><Td value="" />
                    <Td value="—" color="#84a2c0" />
                    <Td value="—" color="#84a2c0" />
                    <Td value={EUR.format(Math.round(fase1.totaalEind))} color={KLEUR_AMBER} bold />
                  </tr>
                </tbody>
              </table>
            </div>
          )}

          {tab === "fase2" && (
            <div>
              <Toelichting>
                Cash en beleggingen blijven apart. Elke maand eerst rendement bijschrijven
                (beleggingen {T.rendementBelegging}%/jr = {fmtPercentPerMaand(T.rendementBelegging)}/mnd, cash {T.renteCash}%/jr = {fmtPercentPerMaand(T.renteCash)}/mnd),
                daarna de netto behoefte onttrekken: eerst volledig uit cash, pas daarna uit beleggingen.
                Netto nominaal uit de pot: {EUR.format(T.uitgavenOverbrugging - T.extraInkomenPerMaand)}/mnd.
                {T.inflatieAan
                  ? ` Uitgaven groeien met ${T.inflatie}%/jr (kosteninflatie), cumulatief vanaf de peildatum (${monthLabel(peildatum)}).`
                  : " Uitgaven blijven nominaal vast (kosteninflatie staat uit)."}
                {` Extra inkomen wordt geïndexeerd met ${T.indexatieInkomen}%/jr.`}
                {T.hypotheekMaandlast > 0 && ` Hierin zit een hypotheeklast van ${EUR.format(T.hypotheekMaandlast)}/mnd, die ${T.hypotheekAflossingDatum ? `wegvalt na ${monthLabel(parseMonthString(T.hypotheekAflossingDatum, peildatum))}` : "niet wegvalt (geen aflossingsdatum ingevuld)"} en dan wordt afgetrokken van de uitgaven.`}
                {" "}
                Bij een tekort: {T.tekortGedrag === "doorrekenen"
                  ? "het saldo mag negatief worden (doorrekenen)."
                  : "het saldo wordt op € 0 gehouden; het gemiste bedrag staat in 'tekortbedrag'."}
              </Toelichting>
              {fase2.tekortBedragCumulatief > 0 && (
                <Banner type="warning" >Cumulatief tekortbedrag (niet onttrokken): {EUR.format(fase2.tekortBedragCumulatief)}.</Banner>
              )}
              <table>
                <thead>
                  <tr>
                    <Th left>Jaar</Th><Th>Leeftijd</Th><Th>Begin totaal</Th><Th>Rendement</Th>
                    <Th>Onttrokken</Th><Th>Inkomen</Th><Th>Eenmalig</Th><Th>Cash</Th><Th>Beleggingen</Th><Th>Totaal</Th>
                  </tr>
                </thead>
                <tbody>
                  {fase2.jaarRijen.map((r, i) => (
                    <tr key={i} className={i % 2 ? "odd" : ""}>
                      <Td left value={r.jaar} />
                      <Td value={r.leeftijd} color="#9ab6d2" />
                      <Td value={EUR.format(r.beginSaldo)} />
                      <Td value={EUR.format(r.rendement)} color={KLEUR_GROEN} />
                      <Td value={`-${EUR.format(r.onttrokken)}`} color="#9a3a3a" />
                      <Td value={EUR.format(r.inkomen)} color="#5a7a4a" />
                      <Td value={r.extra > 0 ? EUR.format(r.extra) : "—"} color={r.extra > 0 ? KLEUR_AMBER : "#84a2c0"} />
                      <Td value={EUR.format(r.cash)} color="#6d8db0" />
                      <Td value={EUR.format(r.belegging)} color={r.belegging >= 0 ? "#9ab6d2" : KLEUR_ROOD} />
                      <Td value={EUR.format(r.eindSaldo)} color={r.eindSaldo >= 0 ? KLEUR_GROEN : KLEUR_ROOD} bold />
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {tab === "fase3" && (
            <div>
              <Toelichting>
                AOW-leeftijd {aowTekst} ({aowBronTekst}) · pensioen + AOW nominaal {EUR.format(T.pensioenInkomen)}/mnd,
                uitgaven nominaal {EUR.format(T.uitgavenPensioen)}/mnd. Nominaal tekort op pensioendatum:
                {" "}{EUR.format(fase3.tekortPerMaandNominaal)}/mnd uit vermogen; een overschot wordt aan het vermogen toegevoegd.
                Rendement beleggingen {T.rendementBelegging}%/jr ({fmtPercentPerMaand(T.rendementBelegging)}/mnd), cash {T.renteCash}%/jr ({fmtPercentPerMaand(T.renteCash)}/mnd), apart bijgehouden; onttrekking eerst uit cash, dan beleggingen.
                {T.inflatieAan
                  ? ` Uitgaven groeien met ${T.inflatie}%/jr (kosteninflatie), cumulatief vanaf de peildatum (${monthLabel(peildatum)}).`
                  : " Uitgaven blijven nominaal vast (kosteninflatie staat uit)."}
                {` Pensioen + AOW wordt geïndexeerd met ${T.indexatieInkomen}%/jr (0% = geen automatische indexatie).`}
                {T.hypotheekMaandlast > 0 && ` Hierin zit een hypotheeklast van ${EUR.format(T.hypotheekMaandlast)}/mnd, die ${T.hypotheekAflossingDatum ? `wegvalt na ${monthLabel(parseMonthString(T.hypotheekAflossingDatum, peildatum))}` : "niet wegvalt (geen aflossingsdatum ingevuld)"} en dan wordt afgetrokken van de uitgaven.`}
                {" "}
                Doorgerekend tot leeftijd {T.leeftijdOverlijden} (planningshorizon, geen sterftescenario).
                {" "}
                Bij een tekort: {T.tekortGedrag === "doorrekenen"
                  ? "het saldo mag negatief worden (doorrekenen)."
                  : "het saldo wordt op € 0 gehouden; het gemiste bedrag staat in 'tekortbedrag'."}
              </Toelichting>
              {fase3.tekortBedragCumulatief > 0 && (
                <Banner type="warning">Cumulatief tekortbedrag (niet onttrokken): {EUR.format(fase3.tekortBedragCumulatief)}.</Banner>
              )}
              <table>
                <thead>
                  <tr>
                    <Th left>Leeftijd</Th><Th>Begin totaal</Th><Th>Rendement</Th><Th>Inkomen</Th>
                    <Th>Uitgaven</Th><Th>Eenmalig</Th><Th>Cash</Th><Th>Beleggingen</Th><Th>Totaal</Th>
                  </tr>
                </thead>
                <tbody>
                  {fase3.jaarRijen.map((r, i) => (
                    <tr key={i} className={i % 2 ? "odd" : ""}>
                      <Td left value={r.leeftijd} />
                      <Td value={EUR.format(r.beginSaldo)} />
                      <Td value={EUR.format(r.rendement)} color={KLEUR_GROEN} />
                      <Td value={EUR.format(r.inkomen)} color="#5a7a4a" />
                      <Td value={`-${EUR.format(r.uitgaven)}`} color="#9a3a3a" />
                      <Td value={r.extra > 0 ? EUR.format(r.extra) : "—"} color={r.extra > 0 ? KLEUR_AMBER : "#84a2c0"} />
                      <Td value={EUR.format(r.cash)} color="#6d8db0" />
                      <Td value={EUR.format(r.belegging)} color={r.belegging >= 0 ? "#9ab6d2" : KLEUR_ROOD} />
                      <Td value={EUR.format(r.eindSaldo)} color={r.eindSaldo >= 0 ? KLEUR_GROEN : KLEUR_ROOD} bold />
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </main>
      </div>
    </div>
  );
}

// Hulpfunctie voor weergave van een jaarrendement als maandpercentage in de toelichting
// (geometrisch, consistent met de berekening — zie jaarPercentageNaarMaandFactor).
function fmtPercentPerMaand(jaarPercentage) {
  if (typeof jaarPercentage !== "number" || !Number.isFinite(jaarPercentage)) return "—";
  return (jaarPercentageNaarMaandFactor(jaarPercentage) * 100).toFixed(2) + "%";
}

// Kleur voor een positieve fase 3-eindstand (groen), valt terug op groen ook bij 0.
function KLEUR_GREEN_FALLBACK() {
  return "#2ecc71";
}

ReactDOM.createRoot(document.getElementById("root")).render(<Pensioenplanner />);
</script>
</body>
</html>

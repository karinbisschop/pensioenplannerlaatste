<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#040a10">
<title>Pensioenplanner</title>
<style>
  :root{
    --bg:#040a10;
    --panel:#060d14;
    --panel-alt:#091828;
    --border:#16293c;
    --border-strong:#27425e;
    --border-soft:#13283d;
    --text:#ecf4fc;
    --text-dim:#dcebfa;
    --muted:#9ab6d2;
    --muted2:#84a2c0;
    --muted3:#6d8db0;
    --green:#2ecc71;
    --red:#e74c3c;
    --amber:#f0a500;
    --blue:#2a7fff;
    --orange:#e07040;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text-dim);
    font-family:'Inter',system-ui,sans-serif}
  #root{min-height:100vh}

  .app{display:flex;flex-direction:column;min-height:100vh}

  .header{background:var(--panel);border-bottom:1px solid var(--border);
    padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .header-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--text)}
  .header-sub{font-size:11px;color:var(--muted2);margin-top:2px;letter-spacing:1px}
  .header-meta{margin-left:auto;font-size:12px;color:var(--muted2);text-align:right}
  .header-meta b{color:var(--text-dim)}

  .layout{display:flex;flex:1;gap:16px;padding:16px;flex-wrap:wrap}
  .sidebar{flex:0 0 340px;display:flex;flex-direction:column;gap:12px;min-width:280px}
  .main{flex:1;min-width:320px;display:flex;flex-direction:column;gap:12px}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
  .card-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);margin:0 0 10px 0;font-weight:600}

  .field{margin-bottom:10px}
  .field-label{font-size:11px;color:var(--muted);margin-bottom:4px;
    text-transform:uppercase;letter-spacing:1px}
  .field-hint{color:var(--blue);text-transform:none;letter-spacing:normal;margin-left:4px}
  .field-input-wrap{display:flex;align-items:center;background:#000a12;
    border:1px solid var(--border-strong);border-radius:5px}
  .field-input{flex:1;background:transparent;border:none;color:var(--text);
    padding:8px 9px;font-size:14px;font-family:'DM Mono',monospace;outline:none;width:100%}
  .field-input-full{width:100%;background:#000a12;border:1px solid var(--border-strong);
    border-radius:5px;color:var(--text);padding:7px 8px;font-size:14px;
    font-family:inherit;outline:none;box-sizing:border-box}
  .field-affix{padding:0 8px;color:var(--muted2);font-size:13px}
  .small-text{font-size:11px;color:var(--muted3);line-height:1.5;margin-top:2px}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;
    gap:10px;margin-bottom:10px}
  .toggle{width:38px;height:22px;border-radius:11px;border:1px solid var(--border-strong);
    background:var(--border-soft);position:relative;cursor:pointer;flex:0 0 auto;padding:0}
  .toggle-on{background:#0d2a50;border-color:var(--blue)}
  .toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;
    background:var(--muted2);transition:left .15s,background .15s}
  .toggle-on .toggle-knob{left:18px;background:var(--blue)}

  .radio-group{display:flex;flex-direction:column;gap:6px}
  .radio-option{display:flex;align-items:flex-start;gap:8px;cursor:pointer;
    padding:8px;border:1px solid var(--border-soft);border-radius:5px;background:#000a12}
  .radio-option.active{border-color:var(--blue);background:#06182c}
  .radio-option input{margin-top:3px}
  .radio-option-text b{display:block;font-size:13px;color:var(--text-dim)}
  .radio-option-text span{font-size:11px;color:var(--muted3)}

  .button{background:var(--border-soft);border:1px solid var(--border-strong);
    color:var(--text-dim);border-radius:5px;padding:7px 12px;font-size:12px;
    cursor:pointer;font-family:inherit}
  .button:hover{border-color:var(--blue)}
  .button-row{display:flex;gap:8px;flex-wrap:wrap}
  .button-danger:hover{border-color:var(--red)}

  .post-row{display:grid;grid-template-columns:1fr 110px 130px 28px;gap:6px;
    align-items:end;margin-bottom:8px}
  .post-remove{background:none;border:none;color:var(--muted3);cursor:pointer;
    font-size:16px;line-height:1;padding:8px 0;align-self:center}
  .post-remove:hover{color:var(--red)}

  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
  .tab{background:none;border:none;color:var(--muted2);padding:10px 14px;
    font-size:13px;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
  .tab.active{color:var(--text);border-bottom-color:var(--blue)}

  .banner{padding:10px 14px;border-radius:6px;font-size:12.5px;line-height:1.6;
    border:1px solid var(--border-soft)}
  .banner-warning{background:#1a0f06;border-color:#5a3a10;color:#f0c080}
  .banner-danger{background:#1a0608;border-color:#5a1010;color:#f0a0a0}
  .banner-info{background:#06182c;border-color:#1a3a5a;color:var(--muted)}
  .banner-ok{background:#061a0e;border-color:#1a4a30;color:#a0e0b0}

  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .summary-card{padding:16px;background:var(--panel);border-radius:8px;border:1px solid var(--border)}
  .summary-card .fase{font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .summary-card .periode{font-size:12px;color:var(--muted2);margin-bottom:8px}
  .summary-card .detail{font-size:11px;color:var(--muted3);line-height:1.6;margin-bottom:10px}
  .summary-card .eind-label{font-size:11px;color:var(--muted2)}
  .summary-card .eind-bedrag{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}

  table{width:100%;border-collapse:collapse}
  th{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border-strong);
    color:var(--muted2);font-weight:400;font-size:11px;text-transform:uppercase;
    letter-spacing:.8px;white-space:nowrap;font-family:'DM Mono',monospace}
  th.th-left{text-align:left}
  td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border-soft);
    font-size:13px;white-space:nowrap;font-family:'DM Mono',monospace}
  td.td-left{text-align:left}
  tr.odd{background:var(--panel)}
  tr.totaalrij{border-top:1px solid #1a3a5a;background:var(--panel-alt)}

  .toelichting{font-size:11px;color:var(--muted3);line-height:1.6;
    background:#000a12;border:1px solid var(--border-soft);border-radius:6px;
    padding:10px 12px;margin-bottom:12px}
  .toelichting-label{color:var(--muted2);text-transform:uppercase;letter-spacing:1px;
    font-size:10px;display:block;margin-bottom:4px}

  details.subcard{border:1px solid var(--border-soft);border-radius:6px;padding:8px 10px;margin-bottom:10px}
  details.subcard summary{cursor:pointer;font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:1px;outline:none}
  details.subcard[open] summary{margin-bottom:8px}

  @media (max-width:760px){
    .layout{flex-direction:column}
    .sidebar{flex:1 1 auto}
  }
</style>
</head>
<body>
<div id="root"><div style="padding:24px;font-family:system-ui,sans-serif">Laden…</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
const {
  useState,
  useEffect,
  useMemo
} = React;
const EUR = new Intl.NumberFormat("nl-NL", {
  style: "currency",
  currency: "EUR",
  maximumFractionDigits: 0
});
const MONTH_NAMES = ["jan", "feb", "mrt", "apr", "mei", "jun", "jul", "aug", "sep", "okt", "nov", "dec"];
function parseMonthString(str, fallback) {
  const m = /^(\d{4})-(\d{2})$/.exec(str || "");
  return m ? new Date(Number(m[1]), Number(m[2]) - 1, 1) : fallback;
}
function monthsBetweenClamped(from, to) {
  const n = (to.getFullYear() - from.getFullYear()) * 12 + (to.getMonth() - from.getMonth());
  return Math.max(0, n);
}
function maandenSindsPeildatum(datum, peildatum) {
  return (datum.getFullYear() - peildatum.getFullYear()) * 12 + (datum.getMonth() - peildatum.getMonth());
}
function monthLabel(date) {
  return `${MONTH_NAMES[date.getMonth()]} ${date.getFullYear()}`;
}
function ageInYearsAt(date, birthYear, birthMonth) {
  return date.getFullYear() - birthYear + (date.getMonth() + 1 < birthMonth ? -1 : 0);
}
function safeNumber(value, min = 0) {
  const n = Number(value);
  return Number.isFinite(n) ? Math.max(min, n) : min;
}
function pad2(n) {
  return String(n).padStart(2, "0");
}
function jaarPercentageNaarMaandFactor(jaarPercentage) {
  return Math.pow(1 + jaarPercentage / 100, 1 / 12) - 1;
}
function berekenHypotheeklast(invoer, peildatum, aflossingDatum, globalIndex) {
  if (invoer.hypotheekMaandlast <= 0) return 0;
  if (!aflossingDatum) return invoer.hypotheekMaandlast;
  const maandIndexAflossing = maandenSindsPeildatum(aflossingDatum, peildatum);
  return globalIndex < maandIndexAflossing ? invoer.hypotheekMaandlast : 0;
}
const AOW_TABEL = [{
  voor: new Date(1948, 0, 1),
  jaren: 65,
  maanden: 0,
  vastgesteld: true
}, {
  voor: new Date(1952, 0, 1),
  jaren: 65,
  maanden: 6,
  vastgesteld: true
}, {
  voor: new Date(1955, 0, 1),
  jaren: 66,
  maanden: 4,
  vastgesteld: true
}, {
  voor: new Date(1957, 2, 1),
  jaren: 66,
  maanden: 10,
  vastgesteld: true
}, {
  voor: new Date(1961, 0, 1),
  jaren: 67,
  maanden: 0,
  vastgesteld: true
}, {
  voor: new Date(1964, 9, 1),
  jaren: 67,
  maanden: 3,
  vastgesteld: true
}, {
  voor: new Date(1970, 0, 1),
  jaren: 67,
  maanden: 6,
  vastgesteld: false
}, {
  voor: new Date(1976, 0, 1),
  jaren: 67,
  maanden: 9,
  vastgesteld: false
}, {
  voor: new Date(1983, 0, 1),
  jaren: 68,
  maanden: 0,
  vastgesteld: false
}, {
  voor: new Date(1990, 0, 1),
  jaren: 68,
  maanden: 3,
  vastgesteld: false
}, {
  voor: new Date(1996, 0, 1),
  jaren: 68,
  maanden: 6,
  vastgesteld: false
}];
const AOW_FALLBACK = {
  jaren: 68,
  maanden: 9,
  vastgesteld: false
};
function berekenAowAutomatisch(geboortejaar, geboortemaand) {
  const geboortedatum = new Date(geboortejaar, geboortemaand - 1, 1);
  for (const regel of AOW_TABEL) {
    if (geboortedatum < regel.voor) {
      return {
        jaren: regel.jaren,
        maanden: regel.maanden,
        vastgesteld: regel.vastgesteld,
        bron: "tabel"
      };
    }
  }
  return {
    ...AOW_FALLBACK,
    bron: "tabel"
  };
}
function berekenAowLeeftijd(invoer) {
  if (invoer.aowHandmatig) {
    return {
      jaren: safeNumber(invoer.aowJarenHandmatig, 60),
      maanden: Math.min(11, Math.max(0, Math.round(safeNumber(invoer.aowMaandenHandmatig, 0)))),
      vastgesteld: true,
      bron: "handmatig"
    };
  }
  return berekenAowAutomatisch(invoer.geboortejaar, invoer.geboortemaand);
}
function berekenAowDatum(geboortejaar, geboortemaand, aow) {
  const totaalMaanden = geboortemaand - 1 + aow.jaren * 12 + aow.maanden;
  const jaar = geboortejaar + Math.floor(totaalMaanden / 12);
  const maand = totaalMaanden % 12 + 1;
  return {
    jaar,
    maand,
    datum: new Date(jaar, maand - 1, 1)
  };
}
function verzamelEenmaligeBedragen(posten, peildatum, meldingen) {
  const bedragenPerMaand = new Map();
  for (const post of posten) {
    const bedrag = safeNumber(post.bedrag);
    if (bedrag <= 0) continue;
    const datum = parseMonthString(post.datum, null);
    if (!datum) continue;
    let maandIndex = maandenSindsPeildatum(datum, peildatum);
    if (maandIndex < 0) {
      meldingen.push(`${post.naam || "Eenmalig bedrag"}: datum ligt vóór de peildatum — bedrag wordt op de startmaand bijgeboekt.`);
      maandIndex = 0;
    }
    bedragenPerMaand.set(maandIndex, (bedragenPerMaand.get(maandIndex) || 0) + bedrag);
  }
  return bedragenPerMaand;
}
function berekenFase1(invoer, peildatum, stopDatum, eenmaligeBedragen) {
  const maandRendementBelegging = jaarPercentageNaarMaandFactor(invoer.rendementBelegging);
  const maandRenteCash = jaarPercentageNaarMaandFactor(invoer.renteCash);
  const aantalMaanden = monthsBetweenClamped(peildatum, stopDatum);
  let belegging = invoer.startBelegging;
  let cash = invoer.startCash;
  const serie = [{
    maand: 0,
    totaal: belegging + cash,
    fase: 1
  }];
  const jaarRijen = [];
  let inlegJaar = 0,
    rendementJaar = 0,
    eenmaligJaar = 0;
  for (let maand = 0; maand < aantalMaanden; maand++) {
    const huidigeDatum = new Date(peildatum.getFullYear(), peildatum.getMonth() + maand, 1);
    const storting = invoer.inflatieAan && invoer.stortingMeeInflatie ? invoer.maandStorting * Math.pow(1 + invoer.inflatie / 100, maand / 12) : invoer.maandStorting;
    const eenmalig = eenmaligeBedragen.get(maand) || 0;
    const rendementDezeMaand = belegging * maandRendementBelegging + cash * maandRenteCash;
    belegging = belegging * (1 + maandRendementBelegging) + storting + eenmalig;
    cash = cash * (1 + maandRenteCash);
    inlegJaar += storting;
    rendementJaar += rendementDezeMaand;
    eenmaligJaar += eenmalig;
    serie.push({
      maand: maand + 1,
      totaal: belegging + cash,
      fase: 1
    });
    const laatsteMaand = maand === aantalMaanden - 1;
    if (huidigeDatum.getMonth() === 11 || laatsteMaand) {
      jaarRijen.push({
        label: huidigeDatum.getMonth() === 11 ? `${huidigeDatum.getFullYear()}` : `${huidigeDatum.getFullYear()} (t/m ${MONTH_NAMES[huidigeDatum.getMonth()]})`,
        inleg: Math.round(inlegJaar),
        rendement: Math.round(rendementJaar),
        extra: Math.round(eenmaligJaar),
        belegging: Math.round(belegging),
        cash: Math.round(cash),
        totaal: Math.round(belegging + cash)
      });
      inlegJaar = 0;
      rendementJaar = 0;
      eenmaligJaar = 0;
    }
  }
  return {
    aantalMaanden,
    beleggingEind: Math.round(belegging),
    cashEind: Math.round(cash),
    totaalEind: belegging + cash,
    jaarRijen,
    serie
  };
}
function berekenFase2(invoer, peildatum, stopDatum, pensioenDatum, startBelegging, startCash, eenmaligeBedragen) {
  const maandRendementBelegging = jaarPercentageNaarMaandFactor(invoer.rendementBelegging);
  const maandRenteCash = jaarPercentageNaarMaandFactor(invoer.renteCash);
  const aantalMaanden = monthsBetweenClamped(stopDatum, pensioenDatum);
  const indexOffset = monthsBetweenClamped(peildatum, stopDatum);
  const aflossingDatum = parseMonthString(invoer.hypotheekAflossingDatum, null);
  let belegging = startBelegging;
  let cash = startCash;
  let tekort = false;
  let tekortDatum = null;
  let tekortBedragCumulatief = 0;
  const serie = [];
  const jaarRijen = [];
  let beginSaldoJaar = belegging + cash;
  let rendementJaar = 0,
    onttrokkenJaar = 0,
    inkomenJaar = 0,
    eenmaligJaar = 0;
  for (let maand = 0; maand < aantalMaanden; maand++) {
    const globalIndex = indexOffset + maand;
    const huidigeDatum = new Date(stopDatum.getFullYear(), stopDatum.getMonth() + maand + 1, 1);
    const kostenInflatieFactor = invoer.inflatieAan ? Math.pow(1 + invoer.inflatie / 100, (globalIndex + 1) / 12) : 1;
    const inkomenIndexatieFactor = Math.pow(1 + invoer.indexatieInkomen / 100, (globalIndex + 1) / 12);
    const hypotheeklast = berekenHypotheeklast(invoer, peildatum, aflossingDatum, globalIndex);
    const uitgaven = invoer.uitgavenOverbrugging * kostenInflatieFactor - hypotheeklast;
    const extraInkomen = invoer.extraInkomenPerMaand * inkomenIndexatieFactor;
    const eenmalig = eenmaligeBedragen.get(globalIndex) || 0;
    const rendement = belegging * maandRendementBelegging + cash * maandRenteCash;
    belegging += belegging * maandRendementBelegging;
    cash += cash * maandRenteCash;
    const nettoBehoefte = uitgaven - extraInkomen - eenmalig;
    if (nettoBehoefte >= 0) {
      const uitCash = Math.min(cash, nettoBehoefte);
      cash -= uitCash;
      let rest = nettoBehoefte - uitCash;
      const uitBelegging = Math.min(Math.max(belegging, 0), rest);
      belegging -= uitBelegging;
      rest -= uitBelegging;
      if (rest > 1e-6) {
        if (!tekort) {
          tekort = true;
          tekortDatum = huidigeDatum;
        }
        if (invoer.tekortGedrag === "nul") {
          tekortBedragCumulatief += rest;
        } else {
          belegging -= rest;
        }
      }
    } else {
      cash += -nettoBehoefte;
    }
    rendementJaar += rendement;
    onttrokkenJaar += uitgaven;
    inkomenJaar += extraInkomen;
    eenmaligJaar += eenmalig;
    serie.push({
      maand: globalIndex,
      totaal: belegging + cash,
      fase: 2
    });
    const laatsteMaand = maand === aantalMaanden - 1;
    if ((maand + 1) % 12 === 0 || laatsteMaand) {
      jaarRijen.push({
        jaar: huidigeDatum.getFullYear(),
        leeftijd: ageInYearsAt(huidigeDatum, invoer.geboortejaar, invoer.geboortemaand),
        beginSaldo: Math.round(beginSaldoJaar),
        rendement: Math.round(rendementJaar),
        onttrokken: Math.round(onttrokkenJaar),
        inkomen: Math.round(inkomenJaar),
        extra: Math.round(eenmaligJaar),
        cash: Math.round(cash),
        belegging: Math.round(belegging),
        eindSaldo: Math.round(belegging + cash)
      });
      beginSaldoJaar = belegging + cash;
      rendementJaar = 0;
      onttrokkenJaar = 0;
      inkomenJaar = 0;
      eenmaligJaar = 0;
    }
  }
  return {
    aantalMaanden,
    beleggingEind: belegging,
    cashEind: cash,
    eindVermogen: belegging + cash,
    tekort,
    tekortDatum,
    tekortBedragCumulatief,
    jaarRijen,
    serie
  };
}
function berekenFase3(invoer, peildatum, pensioenDatum, startBelegging, startCash, eenmaligeBedragen) {
  const maandRendementBelegging = jaarPercentageNaarMaandFactor(invoer.rendementBelegging);
  const maandRenteCash = jaarPercentageNaarMaandFactor(invoer.renteCash);
  const overlijdenDatum = new Date(invoer.geboortejaar + invoer.leeftijdOverlijden, invoer.geboortemaand - 1, 1);
  const aantalMaanden = monthsBetweenClamped(pensioenDatum, overlijdenDatum);
  const indexOffset = monthsBetweenClamped(peildatum, pensioenDatum);
  const aflossingDatum = parseMonthString(invoer.hypotheekAflossingDatum, null);
  let belegging = startBelegging;
  let cash = startCash;
  let tekort = false;
  let tekortDatum = null;
  let tekortBedragCumulatief = 0;
  const tekortPerMaandNominaal = Math.max(0, invoer.uitgavenPensioen - invoer.pensioenInkomen);
  const serie = [];
  const jaarRijen = [];
  let beginSaldoJaar = belegging + cash;
  let rendementJaar = 0,
    uitgavenJaar = 0,
    inkomenJaar = 0,
    eenmaligJaar = 0;
  for (let maand = 0; maand < aantalMaanden; maand++) {
    const globalIndex = indexOffset + maand;
    const huidigeDatum = new Date(pensioenDatum.getFullYear(), pensioenDatum.getMonth() + maand + 1, 1);
    const kostenInflatieFactor = invoer.inflatieAan ? Math.pow(1 + invoer.inflatie / 100, (globalIndex + 1) / 12) : 1;
    const inkomenIndexatieFactor = Math.pow(1 + invoer.indexatieInkomen / 100, (globalIndex + 1) / 12);
    const hypotheeklast = berekenHypotheeklast(invoer, peildatum, aflossingDatum, globalIndex);
    const uitgaven = invoer.uitgavenPensioen * kostenInflatieFactor - hypotheeklast;
    const inkomen = invoer.pensioenInkomen * inkomenIndexatieFactor;
    const eenmalig = eenmaligeBedragen.get(globalIndex) || 0;
    const rendement = belegging * maandRendementBelegging + cash * maandRenteCash;
    belegging += belegging * maandRendementBelegging;
    cash += cash * maandRenteCash;
    const nettoBehoefte = uitgaven - inkomen - eenmalig;
    if (nettoBehoefte >= 0) {
      const uitCash = Math.min(cash, nettoBehoefte);
      cash -= uitCash;
      let rest = nettoBehoefte - uitCash;
      const uitBelegging = Math.min(Math.max(belegging, 0), rest);
      belegging -= uitBelegging;
      rest -= uitBelegging;
      if (rest > 1e-6) {
        if (!tekort) {
          tekort = true;
